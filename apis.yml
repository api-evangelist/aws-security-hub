aid: aws-security-hub
name: AWS Security Hub
description: >-
  AWS Security Hub is a cloud security posture management (CSPM) service that
  aggregates, organizes, and prioritizes security findings from AWS services
  like Amazon GuardDuty, Inspector, and Macie, as well as supported
  third-party products. It continuously assesses your AWS environment against
  security standards such as AWS Foundational Security Best Practices, CIS,
  PCI DSS, and NIST. The Security Hub API and AWS SDKs provide access to
  findings, controls, insights, and automation rules using AWS Signature
  Version 4 authentication.
type: Index
