    name: AWS Security Hub CSPM API
    description: >-
      REST API for managing security standards, controls, findings, insights,
      automation rules, and member account configuration in AWS Security Hub.
      Requests are authenticated with AWS Signature Version 4 (SigV4) using
      AWS access keys or temporary IAM credentials.
    humanURL: https://docs.aws.amazon.com/securityhub/1.0/APIReference/Welcome.html
